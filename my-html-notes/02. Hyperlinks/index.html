<!--

    - What is a Hyperlink?

A hyperlink (or simply "link") allows users to navigate from one webpage
to another webpage, file, or resource.

Hyperlinks are one of the core features of the web.
They connect pages together and create the "web".
In HTML, hyperlinks are created using the <a> tag.

-->

<!DOCTYPE html>
<html>

<head>

    <title>Learn HTML - Hyperlinks</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learn HTML hyperlinks">

</head>

<body>

    <!-- href = Hypertext Reference. It defines the destination of the link. -->
    <a href="https://www.google.com">Go to Google</a>

    <br><br>

    <!-- target="_blank" tells the browser to open the link in a new tab. -->
    <a href="https://www.youtube.com" target="_blank">Open YouTube in new tab</a>

    <br><br>

    <!-- Linking to another page inside the same website -->
    <a href="about.html">Go to About Page</a>

    <br><br>

    <!-- Linking to an email address -->
    <a href="mailto:example@email.com">Send Email</a>

    <br><br>

    <!-- Linking to a phone number -->
    <a href="tel:+123456789">Call Phone</a>

</body>

</html>
