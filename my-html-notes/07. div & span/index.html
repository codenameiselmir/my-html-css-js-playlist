<!--

    - What is a <div>?

The <div> tag is a block-level container used to group HTML elements.

It is commonly used to structure sections of a webpage.

Developers often use <div> together with CSS for layouts and styling.

-->

<!--

    - What is a <span>?

The <span> tag is an inline container used to group small parts of text
or elements inside a line.

Unlike <div>, it does not start on a new line.

It is commonly used for styling specific words or phrases.

-->

<!DOCTYPE html>
<html>

<head>

    <title>Learn HTML - div & span</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learn HTML div and span">

</head>

<body>

    <!--
    Example of a DIV container
    -->

    <div>

        <h2>Section Title</h2>

        <p>This paragraph is inside a div container.</p>

    </div>


    <!--
    Example of SPAN inside text
    -->

    <p>

        This is a normal sentence but
        <span>this part is inside a span element</span>.

    </p>


    <!--
    Using div to group multiple elements
    -->

    <div>

        <h3>Product</h3>

        <p>Name: Laptop</p>

        <p>Price: $1000</p>

    </div>


</body>

</html>
