<!--

    - What is HTML ?

HTML (HyperText Markup Language) is the standard language used to create 
and structure content on the web. It is not a programming language. 
Instead, it is a markup language, meaning it uses tags to describe the structure of a webpage.

HTML tells the browser: what is a heading, where an image appears, where a link should go etc.

    - Why we use index.html ?

We call it index.html because it is usually the default main page of a website.
When a browser opens a folder or a website root, the web server often looks for a default file.

-->

<!DOCTYPE html> <!-- It is a declaration that tells the browser about the document type. -->
<html> <!-- The <html> tag is the root element of an HTML document. -->

<head> <!-- The <head> tag contains information about the webpage, but not the visible content. -->

    <!-- The <title> tag defines the title of the webpage. -->
    <title>Learn HTML</title>

    <!-- It tells the browser which character encoding the page uses. -->
    <meta charset="UTF-8">

    <!-- Used for mobile responsiveness. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- This provides a description of the webpage. -->
    <meta name="description" content="Learn HTML step by step">

</head> <!-- The <head> tag contains information about the webpage, but not the visible content. -->

<body> <!-- The <body> tag contains all the visible content of the webpage. -->

    <!-- Heading tags define titles and subtitles on a webpage. HTML provides six levels of headings: -->
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>

    <!-- The <p> tag defines a paragraph of text. -->
    <p>This is a paragraph.</p>

    <!-- Comment Line -->
    <!-- A comment is a note written in the code that the browser ignores. -->
    <!-- For example, This is my comment line. -->

</body> <!-- The <body> tag contains all the visible content of the webpage. -->

</html> <!-- The <html> tag is the root element of an HTML document. -->
