<!--

    - What are Semantic Tags?

Semantic HTML tags clearly describe the meaning of the content.

They help browsers, developers, and search engines understand
the structure of a webpage.

Instead of using many <div> elements, semantic tags describe
what each section of the page represents.

-->

<!DOCTYPE html>
<html>

<head>

    <title>Learn HTML - Semantic Tags</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learn HTML semantic elements">

</head>

<body>

    <!--
    Header section of the page
    -->

    <header>
        <h1>My Website</h1>
        <p>Welcome to my website</p>
    </header>


    <!--
    Navigation menu
    -->

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>


    <!--
    Main content area
    -->

    <main>

        <section>

            <h2>Blog Section</h2>

            <article>
                <h3>First Article</h3>
                <p>This is my first article.</p>
            </article>

            <article>
                <h3>Second Article</h3>
                <p>This is my second article.</p>
            </article>

        </section>

    </main>


    <!--
    Sidebar content
    -->

    <aside>
        <h3>Related Links</h3>
        <p>Some additional information.</p>
    </aside>


    <!--
    Footer section
    -->

    <footer>
        <p>Copyright © 2026</p>
    </footer>


</body>

</html>
