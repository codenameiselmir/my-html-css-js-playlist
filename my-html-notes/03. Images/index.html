<!--

    - What are Images in HTML?

Images are used to display pictures on a webpage.

They can be photos, logos, icons, illustrations, or graphics.

In HTML, images are added using the <img> tag.

Unlike many HTML elements, the <img> tag does not have a closing tag.
It is a self-closing tag!

-->

<!DOCTYPE html>
<html>

<head>

    <title>Learn HTML - Images</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learn HTML images">

</head>

<body>

    <!--
    Basic Image

    src = Source
    It tells the browser where the image file is located.
    -->

    <img src="image.jpg">


    <!--
    Image with Alternative Text
    
    alt = Alternative text
    It describes the image if the image cannot be displayed.
    It is also important for accessibility and screen readers.
    -->

    <br><br>

    <img src="image.jpg" alt="A beautiful landscape">


    <!--
    Setting Image Width and Height
    -->

    <br><br>

    <img src="image.jpg" alt="Landscape image" width="300" height="200">


    <!--
    Image from the Internet (External Image)
    -->

    <br><br>

    <img src="https://picsum.photos/300/200" alt="Random image from internet">


</body>

</html>
