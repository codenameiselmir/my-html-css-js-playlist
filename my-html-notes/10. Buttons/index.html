<!--

    - What are Buttons in HTML?

Buttons are interactive elements used to trigger actions.

Examples:
submitting forms, opening menus, running JavaScript functions.

HTML provides the <button> element for creating buttons.

-->

<!DOCTYPE html>
<html>

<head>

    <title>Learn HTML - Buttons</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learn HTML buttons">

</head>

<body>

    <!--
    Basic Button
    -->

    <button>Click Me</button>


    <!--
    Button with type attribute
    -->

    <br><br>

    <button type="button">Normal Button</button>


    <!--
    Submit Button (commonly used inside forms)
    -->

    <br><br>

    <button type="submit">Submit Form</button>


    <!--
    Reset Button (resets form fields)
    -->

    <br><br>

    <button type="reset">Reset Form</button>


    <!--
    Disabled Button
    -->

    <br><br>

    <button disabled>Disabled Button</button>


</body>

</html>
