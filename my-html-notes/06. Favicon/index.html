<!--

    - What is a Favicon?

A favicon (short for "favorite icon") is the small icon that appears
in the browser tab next to the webpage title.

Favicons help users easily identify a website.

They are also used in bookmarks and browser history.

Favicons are added inside the <head> section of an HTML document.

-->

<!DOCTYPE html>
<html>

<head>

    <title>Learn HTML - Favicons</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learn HTML favicons">

    <!--
    Basic Favicon Example
    rel = relationship between the document and the resource
    href = location of the favicon file
    -->

    <link rel="icon" href="favicon.ico">

</head>

<body>

    <h1>Favicon Example</h1>

    <p>Look at the browser tab to see the favicon.</p>

</body>

</html>
