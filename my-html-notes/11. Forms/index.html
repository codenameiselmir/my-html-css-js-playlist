<!--

    - What are Forms in HTML?

Forms are used to collect user input and send data to a server.

Examples:
login forms, registration forms, search boxes, contact forms.

Forms are created using the <form> element.

-->

<!DOCTYPE html>
<html>

<head>

    <title>Learn HTML - Forms</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learn HTML forms">

</head>

<body>

    <!--
    Basic Form Example
    -->

    <form>

        <label>Name:</label>
        <input type="text">

        <br><br>

        <label>Email:</label>
        <input type="email">

        <br><br>

        <button type="submit">Submit</button>

    </form>


    <!--
    Different Input Types
    -->

    <br><br>

    <form>

        <label>Password:</label>
        <input type="password">

        <br><br>

        <label>Age:</label>
        <input type="number">

        <br><br>

        <label>Date of Birth:</label>
        <input type="date">

        <br><br>

        <button type="submit">Submit</button>

    </form>


    <!--
    Radio Buttons
    -->

    <br><br>

    <form>

        <p>Choose your gender:</p>

        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female

    </form>


    <!--
    Checkbox Example
    -->

    <br><br>

    <form>

        <p>Select your skills:</p>

        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JavaScript

    </form>


</body>

</html>
